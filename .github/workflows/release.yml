name: Release

# Spec §8.5.2 — fires only on a vMAJOR.MINOR.PATCH tag.
# A release-ready :app signing config arrives in Plan 1 Task 17; this workflow
# is intentionally checked in early so the first v*.*.* tag works end-to-end
# the moment the app module is real (no scrambling at release time).

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & publish AAB
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the auto-generated changelog can walk back to the
          # previous tag for release notes.
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See docs/RELEASE.md."
            exit 1
          fi
          mkdir -p app
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          echo "PAWCLOCK_KEYSTORE_PATH=$(pwd)/app/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble signed release bundle
        env:
          PAWCLOCK_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PAWCLOCK_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PAWCLOCK_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon --stacktrace

      - name: Verify bundle size (<= 15 MB per spec §8.5.2)
        env:
          BUNDLE_SIZE_LIMIT_MB: '15'
        run: ./scripts/verify-bundle-size.sh

      - name: Locate AAB
        id: locate_aab
        run: |
          AAB_PATH=$(ls -t app/build/outputs/bundle/release/*.aab | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "::error::No .aab found under app/build/outputs/bundle/release/"
            exit 1
          fi
          echo "aab_path=$AAB_PATH" >> "$GITHUB_OUTPUT"
          echo "Found AAB: $AAB_PATH"

      - name: Upload AAB artifact (CI debug)
        uses: actions/upload-artifact@v4
        with:
          name: pawclock-release-aab
          path: ${{ steps.locate_aab.outputs.aab_path }}
          if-no-files-found: error

      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            "${{ steps.locate_aab.outputs.aab_path }}" \
            --title "PawClock $TAG" \
            --generate-notes \
            --verify-tag

      # ----------------------------------------------------------------------
      # Google Play promotion (manual, off by default).
      # Uncomment when a service-account JSON is available in secrets.
      # Tracks ladder per spec §8.5.2: internal -> alpha -> beta -> production.
      #
      # - name: Promote to Google Play internal track
      #   uses: r0adkll/upload-google-play@v1
      #   with:
      #     serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
      #     packageName: app.pawclock
      #     releaseFiles: ${{ steps.locate_aab.outputs.aab_path }}
      #     track: internal
      #     status: completed
      # ----------------------------------------------------------------------
